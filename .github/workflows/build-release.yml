name: Build and Release NuGet package

on:
  pull_request:
  push:
    branches: [main, feature/package] # To be removed when merged
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to NuGet
        default: "No"
        type: choice
        options:
          - "No"
          - Staging
          - Production
      zisk_ref:
        description: Zisk ref
        required: true
        default: pre-develop-0.16.0

jobs:
  build-ziskos:
    name: Build ziskos
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static library
        env:
          ZISK_TAG: ${{ github.event.inputs.zisk_ref || 'pre-develop-0.16.0' }}
        run: ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libziskos
          path: |
            output/libziskos.a
            output/libziskos.bflat.manifest
          if-no-files-found: error

  build-nupkg:
    name: Build nupkg
    needs: build-ziskos
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download libziskos artifact
        uses: actions/download-artifact@v4
        with:
          name: libziskos

      - name: Move artifacts to bindings
        run: |
          mkdir -p src/bindings/runtimes/linux-riscv64/native
          mv libziskos.a src/bindings/runtimes/linux-riscv64/native/
          mv libziskos.bflat.manifest src/bindings/

      - name: Inject zisk_ref and package_version into manifest
        env:
          ZISK_REF: ${{ github.event.inputs.zisk_ref || 'pre-develop-0.16.0' }}
        run: |
          PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' src/bindings/Directory.Build.props | tr -d '[:space:]')
          SUFFIX=$(grep -oP '(?<=<VersionSuffix>)[^<]+' src/bindings/Directory.Build.props | tr -d '[:space:]')
          VERSION="$PREFIX${SUFFIX:+-$SUFFIX}"

          MANIFEST=src/bindings/libziskos.bflat.manifest
          jq --arg ref "$ZISK_REF" --arg version "$VERSION" \
            '. + {zisk_ref: $ref, package_version: $version}' \
            "$MANIFEST" > "$MANIFEST.tmp"
          mv "$MANIFEST.tmp" "$MANIFEST"

      - name: Pack
        working-directory: src/bindings
        run: dotnet pack Nethermind.ZiskBindings.csproj -c release

      - name: Get package version
        id: pkg
        working-directory: src/bindings
        run: |
          PKG=$(ls ./artifacts/package/release/*.nupkg | head -1)
          VERSION=$(basename "$PKG" .nupkg | sed 's/^Nethermind\.ZiskBindings\.//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            src/bindings/artifacts/package/release/*.nupkg
            src/bindings/artifacts/package/release/*.snupkg
          if-no-files-found: error

  publish-nupkg-nuget:
    name: Publish to NuGet
    needs: build-nupkg
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'No') || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            -k ${{ github.event.inputs.publish == 'Staging' && secrets.NUGETTEST_API_KEY || secrets.NUGET_API_KEY }} \
            -s ${{ github.event.inputs.publish == 'Staging' && 'https://apiint.nugettest.org/v3/index.json' || 'https://api.nuget.org/v3/index.json' }}

  publish-nupkg-github:
    name: Publish to GitHub
    needs: build-nupkg
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'No') || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg

      - name: Download libziskos artifact
        uses: actions/download-artifact@v4
        with:
          name: libziskos
          path: libziskos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-nupkg.outputs.version }}
          name: Nethermind.ZiskBindings ${{ needs.build-nupkg.outputs.version }}
          files: |
            nupkg/*.nupkg
            nupkg/*.snupkg
            libziskos/libziskos.a
            libziskos/libziskos.bflat.manifest
          body: |
            NuGet package for ZisK C# bindings.

            **Package**: `Nethermind.ZiskBindings`
            **Version**: `${{ needs.build-nupkg.outputs.version }}`

            Built from zisk repository ref: `${{ github.event.inputs.zisk_ref || 'pre-develop-0.16.0' }}`
          draft: false
          prerelease: ${{ contains(needs.build-nupkg.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
