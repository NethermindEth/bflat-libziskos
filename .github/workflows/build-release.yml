name: Build and publish NuGet package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to NuGet
        default: "No"
        type: choice
        options:
          - "No"
          - Staging
          - Production
      zisk_ref:
        description: Zisk ref
        type: string
        default: v0.17.0
      build_docker:
        description: Build ZisK Docker image
        type: boolean
        default: false

env:
  ZISK_REF: ${{ inputs.zisk_ref }}

jobs:
  build-ziskos:
    name: Build ziskos
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build static library
        run: ./build/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libziskos
          path: |
            output/libziskos.a
            output/libziskos.bflat.manifest
          if-no-files-found: error

  build-nupkg:
    name: Build NuGet package
    needs: build-ziskos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5

      - name: Download libziskos artifact
        uses: actions/download-artifact@v8
        with:
          name: libziskos

      - name: Move artifacts to bindings
        run: |
          mkdir -p src/bindings/runtimes/linux-riscv64/native
          mv libziskos.a src/bindings/runtimes/linux-riscv64/native/
          mv libziskos.bflat.manifest src/bindings/

      - name: Inject zisk_ref and package_version into manifest
        run: |
          PREFIX=$(grep -oP '(?<=<VersionPrefix>)[^<]+' src/bindings/Directory.Build.props | tr -d '[:space:]')
          SUFFIX=$(grep -oP '(?<=<VersionSuffix>)[^<]+' src/bindings/Directory.Build.props | tr -d '[:space:]')
          VERSION="$PREFIX${SUFFIX:+-$SUFFIX}"

          MANIFEST=src/bindings/libziskos.bflat.manifest
          jq --arg ref "$ZISK_REF" --arg version "$VERSION" \
            '. + {zisk_ref: $ref, package_version: $version}' \
            "$MANIFEST" > "$MANIFEST.tmp"
          mv "$MANIFEST.tmp" "$MANIFEST"

      - name: Pack
        working-directory: src/bindings
        run: dotnet pack Nethermind.ZiskBindings.csproj -c release

      - name: Publish NuGet package
        if: github.event_name == 'workflow_dispatch' && inputs.publish != 'No'
        working-directory: src/bindings
        run: |
          dotnet nuget push ./artifacts/package/release/*.nupkg \
            -k ${{ inputs.publish == 'Staging' && secrets.NUGETTEST_API_KEY || secrets.NUGET_API_KEY }} \
            -s ${{ inputs.publish == 'Staging' && 'https://apiint.nugettest.org/v3/index.json' || 'https://api.nuget.org/v3/index.json' }}

      - name: Get package version
        id: pkg
        working-directory: src/bindings
        run: |
          PKG=$(ls ./artifacts/package/release/*.nupkg | head -1)
          VERSION=$(basename "$PKG" .nupkg | sed 's/^Nethermind\.ZiskBindings\.//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: src/bindings/artifacts/package/release/*.nupkg
          if-no-files-found: error

  publish-docker:
    name: Publish ZisK Docker image
    if: inputs.build_docker
    needs: build-nupkg
    uses: ./.github/workflows/publish-docker.yml
    with:
      zisk_ref: ${{ inputs.zisk_ref }}
    secrets: inherit

  publish-nupkg-github:
    name: Publish to GitHub
    if: github.event_name == 'workflow_dispatch' && inputs.publish != 'No'
    needs: build-nupkg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download nupkg artifact
        uses: actions/download-artifact@v8
        with:
          name: nupkg
          path: nupkg

      - name: Download libziskos artifact
        uses: actions/download-artifact@v8
        with:
          name: libziskos
          path: libziskos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-nupkg.outputs.version }}
          name: Nethermind.ZiskBindings ${{ needs.build-nupkg.outputs.version }}
          files: |
            nupkg/*.nupkg
            nupkg/*.snupkg
            libziskos/libziskos.a
            libziskos/libziskos.bflat.manifest
          body: |
            NuGet package for ZisK C# bindings.

            **Package**: `Nethermind.ZiskBindings`
            **Version**: `${{ needs.build-nupkg.outputs.version }}`

            Built from zisk repository ref: `${{ env.ZISK_REF }}`
          draft: false
          prerelease: ${{ contains(needs.build-nupkg.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
